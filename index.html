<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Pontuação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Tabela de Pontuação</h1>
    <table id = "tabela">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Pontuação</th>
                <th>Ranking</th>
            </tr>
        </thead>
        <tbody id="tabelaBody">

        </tbody>
    </table>

    <button id="crescente" onclick="rankingCrescente()">Crescente</button>
    <button id="decrescente" onclick="rankingDecrescente()">Decrescrente</button>

    <h2>Adicionar Pontuação</h2>
    <form id = "formUsuario" >
        <input type="text" id = "inputNome"  placeholder="Nome" minlength = "3" maxlength="20" required>
        <input type="number" id = "inputPontuacao"  placeholder="Pontuação" min = "1" max = "999" required>
        <input type="submit" value="Submit">
    </form>
    <div id = "text-formUsuario"></div>
    
    <h2>Apagar Jogador</h2>
    <form id = "formApagarJogador" >
        <input type="text" id = "inputNomeApagar"  placeholder="Nome" minlength = "3" maxlength="20" required>
        <input type="submit" value="Submit">
    </form>
    <div id = "text-FormApagar"></div>
    
    <script src = "script.js"> </script>
</body>
</html>
